<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KPI Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f3f5fa;--sur:#fff;--sur2:#f7f9fd;--sur3:#eef1f8;
  --brd:#e2e7f0;--brd2:#cdd5e4;
  --tx:#0d1526;--tx2:#475569;--tx3:#8898b0;
  --ac:#3b5bdb;--acl:#eef2ff;--acb:#c5d0fa;
  --gr:#2f9e44;--grl:#ebfbee;--grb:#b2f2bb;
  --rd:#e03131;--rdl:#fff5f5;--rdb:#ffc9c9;
  --yw:#e67700;--ywl:#fff9db;--ywb:#ffec99;
  --cn:#c8d3e5;
  --s1:0 1px 3px rgba(0,0,0,.06);
  --s2:0 3px 10px rgba(0,0,0,.08);
  --s3:0 8px 28px rgba(0,0,0,.12);
  --r:10px;--rs:7px;
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

/* TOPBAR */
#topbar{height:54px;background:var(--sur);border-bottom:1px solid var(--brd);display:flex;align-items:center;gap:6px;padding:0 14px;z-index:200;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.brand{display:flex;align-items:center;gap:7px;margin-right:4px}
.brand-logo{width:28px;height:28px;background:linear-gradient(135deg,#3b5bdb,#4c6ef5);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-logo svg{color:#fff}
.brand-text{font-size:14px;font-weight:700;letter-spacing:-.3px}
.brand-text span{color:var(--ac)}
.sep{width:1px;height:22px;background:var(--brd);margin:0 2px;flex-shrink:0}
.lbl{font-size:9.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.09em;white-space:nowrap}
.sel{height:28px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur2);color:var(--tx);font-family:Inter,sans-serif;font-size:12px;font-weight:500;padding:0 8px;cursor:pointer;outline:none}
.sel:focus{border-color:var(--ac)}
.ico{width:26px;height:26px;border:1px solid var(--brd);background:var(--sur);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:14px;transition:all .15s;flex-shrink:0}
.ico:hover{background:var(--acl);border-color:var(--acb);color:var(--ac)}
.tog-wrap{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--tx2)}
.tog{position:relative;width:34px;height:19px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-sl{position:absolute;inset:0;background:var(--brd2);border-radius:19px;cursor:pointer;transition:.2s}
.tog-sl::before{content:'';position:absolute;left:2px;top:2px;width:15px;height:15px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-sl{background:var(--ac)}
.tog input:checked+.tog-sl::before{transform:translateX(15px)}
.srch{position:relative;flex:1;max-width:190px}
.srch svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}
.srch input{width:100%;height:28px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur2);padding:0 8px 0 28px;font-family:Inter,sans-serif;font-size:12px;color:var(--tx);outline:none}
.srch input:focus{border-color:var(--ac)}
.srch input::placeholder{color:var(--tx3)}
.btn{height:28px;padding:0 10px;border:1px solid var(--brd);background:var(--sur);border-radius:var(--rs);font-family:Inter,sans-serif;font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--acl);border-color:var(--acb);color:var(--ac)}
.btn.pri{background:var(--ac);color:#fff;border-color:var(--ac)}
.btn.pri:hover{background:#3451c7}
#zlv{font-size:10px;font-weight:700;color:var(--tx3);font-family:"JetBrains Mono",monospace;min-width:34px;text-align:center}
#sync{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;border:1px solid var(--brd);background:var(--sur2);color:var(--tx3);white-space:nowrap;flex-shrink:0}
#sdot{width:7px;height:7px;border-radius:50%;background:var(--tx3);flex-shrink:0;transition:background .3s}
#sync.ok #sdot{background:var(--gr)}
#sync.saving #sdot{background:var(--yw)}
#sync.error #sdot{background:var(--rd)}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sb{width:252px;background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sb-head{padding:12px 12px 10px;border-bottom:1px solid var(--brd);display:flex;flex-direction:column;gap:7px}
#sb-head h3{font-size:9.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.btn-dash{width:100%;height:28px;border:1.5px dashed var(--brd2);background:transparent;border-radius:var(--rs);font-family:Inter,sans-serif;font-size:11px;font-weight:600;color:var(--ac);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;transition:all .15s}
.btn-dash:hover{background:var(--acl);border-color:var(--ac)}
#sb-list{flex:1;overflow-y:auto;padding:6px 8px 16px}
#sb-list::-webkit-scrollbar{width:3px}
#sb-list::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:3px}
.area-grp{margin-bottom:2px}
.area-hd{display:flex;align-items:center;gap:5px;padding:6px 8px;border-radius:var(--rs);cursor:pointer;transition:background .15s;user-select:none}
.area-hd:hover{background:var(--sur3)}
.chev{font-size:8px;color:var(--tx3);transition:transform .2s;flex-shrink:0;width:10px;display:inline-block}
.chev.op{transform:rotate(90deg)}
.adot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.anm{font-size:11px;font-weight:700;color:var(--tx2);flex:1}
.act{font-size:9px;color:var(--tx3);background:var(--sur3);padding:1px 5px;border-radius:8px;font-family:"JetBrains Mono",monospace}
.aacts{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.area-hd:hover .aacts{opacity:1}
.xbtn{width:17px;height:17px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;color:var(--tx3);font-size:10px;transition:all .15s}
.xbtn:hover{background:var(--brd);color:var(--tx)}
.xbtn.d:hover{background:var(--rdl);color:var(--rd)}
.trees{padding-left:10px;display:flex;flex-direction:column;gap:1px;margin-top:1px}
.ti{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:var(--rs);cursor:pointer;transition:all .15s;user-select:none;border-left:2px solid transparent;margin-left:2px}
.ti:hover{background:var(--sur3)}
.ti.on{background:var(--acl);border-left-color:var(--ac)}
.ti.on .tnm{color:var(--ac);font-weight:700}
.tic{font-size:10px;flex-shrink:0;opacity:.5}
.tnm{font-size:11px;color:var(--tx2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.tacts{display:flex;gap:2px;opacity:0;transition:opacity .15s}
.ti:hover .tacts{opacity:1}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#tabs{display:flex;border-bottom:1px solid var(--brd);background:var(--sur);padding:0 16px;flex-shrink:0}
.tab{height:38px;padding:0 14px;border:none;background:transparent;font-family:Inter,sans-serif;font-size:12px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);font-weight:700}

/* CANVAS */
#vc{flex:1;overflow:hidden;position:relative;cursor:grab;display:none;background:#f0f3fb}
#vc.on{display:block}
#vc.drag{cursor:grabbing}
#vc::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#bec8de 1px,transparent 1px);background-size:26px 26px;opacity:.4;pointer-events:none}
#ci{position:absolute;transform-origin:0 0;will-change:transform}
#csvg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible}
#cnodes{position:relative}
#empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--tx3);pointer-events:none}
#empty svg{opacity:.25}
#empty p{font-size:13px;font-weight:500}

/* DATA VIEW */
#vd{flex:1;overflow:auto;padding:20px;display:none}
#vd.on{display:block}
#vd::-webkit-scrollbar{width:5px;height:5px}
#vd::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:5px}

/* CARDS */
.card{width:172px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);padding:12px 13px 10px;position:absolute;box-shadow:var(--s2);transition:box-shadow .2s,transform .15s;cursor:pointer;user-select:none;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.gr::before{background:linear-gradient(90deg,#2f9e44,#40c057)}
.card.rd::before{background:linear-gradient(90deg,#e03131,#fa5252)}
.card.yw::before{background:linear-gradient(90deg,#e67700,#fcc419)}
.card:hover{box-shadow:var(--s3);transform:translateY(-2px)}
.card.hl{border-color:var(--ac)!important;box-shadow:0 0 0 3px rgba(59,91,219,.15),var(--s3)!important}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:4px;margin-bottom:9px}
.cn{font-size:11.5px;font-weight:700;line-height:1.3;flex:1;color:var(--tx)}
.ctog{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--brd2);background:var(--sur3);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--tx3);cursor:pointer;flex-shrink:0;transition:all .15s;margin-top:1px;user-select:none}
.ctog:hover{background:var(--acl);border-color:var(--ac);color:var(--ac)}
.cv{display:flex;gap:10px;margin-bottom:9px}
.vb{flex:1}
.vl{font-size:8px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.vn{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:700;color:var(--tx)}
.vn.off{color:var(--rd)}
.cf{display:flex;align-items:center;justify-content:space-between;padding-top:7px;border-top:1px solid var(--brd)}
.cl{font-size:7.5px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.cc{font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;color:var(--tx3)}
.cc.gr{color:var(--gr);opacity:.85}.cc.rd{color:var(--rd);font-weight:700}.cc.yw{color:var(--yw);font-weight:700}
.sem{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sem.gr{background:var(--gr);box-shadow:0 0 0 3px var(--grb)}
.sem.rd{background:var(--rd);box-shadow:0 0 0 3px var(--rdb)}
.sem.yw{background:var(--yw);box-shadow:0 0 0 3px var(--ywb)}

/* STATUS */
#sbar{height:27px;background:var(--sur);border-top:1px solid var(--brd);display:flex;align-items:center;gap:14px;padding:0 14px;font-size:10.5px;color:var(--tx3);flex-shrink:0}
.sd{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}

/* TOOLTIP */
#tt{position:fixed;background:#111827;color:#e2e8f0;border-radius:var(--r);padding:10px 13px;font-size:11px;line-height:1.7;pointer-events:none;opacity:0;transition:opacity .12s;z-index:999;max-width:210px;box-shadow:0 12px 32px rgba(0,0,0,.28)}
#tt.on{opacity:1}
#tt strong{font-size:11.5px;display:block;margin-bottom:4px;color:#fff;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);padding-bottom:4px}
.tr{display:flex;justify-content:space-between;gap:14px}
.tk{color:#64748b;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
.tv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:11px}

/* MODAL */
.mbg{position:fixed;inset:0;background:rgba(8,12,24,.5);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mbg.on{display:flex}
.modal{background:var(--sur);border-radius:14px;box-shadow:var(--s3);width:420px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--brd)}
.mh{padding:16px 18px 13px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.mh h2{font-size:14px;font-weight:700}
.mc{width:26px;height:26px;border:none;background:var(--sur3);border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--tx2);transition:all .15s}
.mc:hover{background:var(--rdl);color:var(--rd)}
.mb{padding:16px 18px;overflow-y:auto;display:flex;flex-direction:column;gap:13px}
.mf{padding:11px 18px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px;background:var(--sur2)}
.fr{display:flex;flex-direction:column;gap:4px}
.fr label{font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.07em}
.fr input,.fr select,.fr textarea{height:34px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--sur2);font-family:Inter,sans-serif;font-size:13px;color:var(--tx);padding:0 10px;outline:none;transition:all .15s;width:100%}
.fr input:focus,.fr select:focus,.fr textarea:focus{border-color:var(--ac);box-shadow:0 0 0 2px var(--acl);background:#fff}
.fr textarea{height:60px;padding:8px 10px;resize:vertical}
.fr.row{flex-direction:row;gap:10px}.fr.row>*{flex:1}
.fhint{font-size:10px;color:var(--tx3);line-height:1.5}
.colors{display:flex;gap:6px;flex-wrap:wrap}
.chip{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s}
.chip:hover,.chip.on{border-color:var(--tx);transform:scale(1.18)}
.bm{height:32px;padding:0 16px;border-radius:var(--rs);font-family:Inter,sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:1px solid transparent}
.bm.cancel{background:var(--sur3);color:var(--tx2);border-color:var(--brd)}.bm.cancel:hover{background:var(--brd)}
.bm.save{background:var(--ac);color:#fff}.bm.save:hover{background:#3451c7}
.bm.danger{background:var(--rd);color:#fff}.bm.danger:hover{background:#c92a2a}

/* DATA TABLE */
.dh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.dh h3{font-size:15px;font-weight:700}
.dtb{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.dg{display:flex;align-items:center;gap:6px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--rs);padding:4px 8px}
.dtw{background:var(--sur);border-radius:var(--r);box-shadow:var(--s1);border:1px solid var(--brd);overflow:auto;max-height:calc(100vh - 210px)}
.dtw table{border-collapse:separate;border-spacing:0;font-size:12px;width:max-content;min-width:100%}
.dtw thead{position:sticky;top:0;z-index:12}
.dtw thead tr:first-child th{background:#1e293b;color:#94a3b8;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:9px 10px;border-bottom:1px solid #334155;white-space:nowrap}
.dtw thead tr:nth-child(2) th{background:#243044;color:#64748b;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 10px;border-bottom:2px solid var(--brd);white-space:nowrap}
td.st,th.st{position:sticky;z-index:5}
td.st{background:var(--sur)}
tr:hover td.st{background:var(--sur2)}
th.st{z-index:13}
.dtw thead tr:first-child th.st{background:#1e293b}
.dtw thead tr:nth-child(2) th.st{background:#243044}
.s0{left:0;min-width:140px;max-width:140px;border-right:1px solid var(--brd)}
.s1{left:140px;min-width:64px;max-width:64px;border-right:1px solid var(--brd)}
.s2{left:204px;min-width:90px;max-width:90px;border-right:1px solid var(--brd2)}
.s3{left:294px;min-width:106px;max-width:106px;border-right:1px solid var(--brd)}
.s4{left:400px;min-width:52px;border-right:2px solid var(--brd2)}
td{padding:7px 10px;border-bottom:1px solid var(--brd);color:var(--tx2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sur2)}
.tkpi{font-weight:700;color:var(--tx);font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mhd{text-align:center;border-left:2px solid #334155!important}
.msub{border-left:2px solid var(--brd2)!important}
.ci{width:70px;height:24px;border:1px solid var(--brd);border-radius:5px;background:var(--sur3);font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:500;color:var(--tx);padding:0 6px;outline:none;text-align:right;transition:all .15s}
.ci:focus{border-color:var(--ac);background:#fff;box-shadow:0 0 0 2px var(--acl)}
.ci.chg{border-color:var(--ac);background:var(--acl)}

/* CHART MODAL */
#mch .modal{width:640px;max-width:96vw}
.chwrap{width:100%;height:300px;position:relative}

/* EXPORT */
#exp{position:fixed;inset:0;background:rgba(8,12,24,.5);z-index:600;display:none;align-items:center;justify-content:center}
#exp.on{display:flex}
.expc{background:var(--sur);border-radius:14px;padding:22px 30px;box-shadow:var(--s3);display:flex;flex-direction:column;align-items:center;gap:10px;font-size:13px;color:var(--tx2)}
.spin{width:26px;height:26px;border:3px solid var(--brd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%) translateY(8px);background:#111827;color:#e2e8f0;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:999;box-shadow:var(--s3);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <div class="brand-logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
    <span class="brand-text">KPI<span>Manager</span></span>
  </div>
  <div class="sep"></div>
  <span class="lbl">Ano</span>
  <select class="sel" id="ysel" style="min-width:68px"></select>
  <span class="lbl">Mes</span>
  <button class="ico" id="bprev">&#8249;</button>
  <select class="sel" id="msel" style="min-width:78px"></select>
  <button class="ico" id="bnext">&#8250;</button>
  <div class="sep"></div>
  <div class="tog-wrap">
    <span>Mensual</span>
    <label class="tog"><input type="checkbox" id="ytd"/><span class="tog-sl"></span></label>
    <span>YTD</span>
  </div>
  <div class="sep"></div>
  <div class="srch">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="srch" placeholder="Buscar KPI..."/>
  </div>
  <div class="sep"></div>
  <button class="btn" id="bexp">+ Expandir</button>
  <button class="btn" id="bcol">- Contraer</button>
  <div class="sep"></div>
  <button class="ico" id="bzo">-</button>
  <span id="zlv">100%</span>
  <button class="ico" id="bzi">+</button>
  <button class="btn" id="bzr">Reset</button>
  <div class="sep"></div>
  <button class="btn" id="bpng">PNG</button>
  <button class="btn pri" id="bpdf">PDF</button>
  <div class="sep"></div>

// ─── SUPABASE ─────────────────────────────────────
function initSB(){
  const cfg=getCfg();

  if(!url||!key){setSS('error','Sin configurar');return false;}

function setSS(s,t){
  const b=document.getElementById('sync');

  document.getElementById('stxt').textContent=t;

async function sbLoad(){
  if(!SB)return;setSS('saving','Cargando...');
  try{
    const[ar,tr,kp,dt]=await Promise.all([
      SB.from('areas').select('*').order('created_at'),
      SB.from('trees').select('*').order('created_at'),
      SB.from('kpis').select('*').order('created_at'),
      SB.from('kpi_data').select('*'),
    ]);
    if(ar.error)throw ar.error;
    if(tr.error)throw tr.error;
    if(kp.error)throw kp.error;
    if(dt.error)throw dt.error;
    DB.areas=ar.data||[];
    DB.trees=(tr.data||[]).map(t=>({
      id:t.id,name:t.name,areaId:t.area_id,desc:t.description,
      kpis:(kp.data||[]).filter(k=>k.tree_id===t.id).map(k=>({
        id:k.id,name:k.name,parent:k.parent_id||'ROOT',
        unit:k.unit||'',type:k.kpi_type||'higher_is_better',
        yellow:k.yellow_zone||3,owner:k.owner||'',tree_id:k.tree_id
      })),
      data:(dt.data||[]).filter(d=>d.tree_id===t.id).map(d=>({
        kpiId:d.kpi_id,month:d.month,
        real:d.real,target:d.target,ytdReal:d.ytd_real,ytdTarget:d.ytd_target
      }))
    }));
    setSS('ok','Sincronizado');
  }catch(e){setSS('error',e.message||'Error');console.error(e);}
}
async function sbArea(a){if(!SB)return;setSS('saving','...');const{error}=await SB.from('areas').upsert({id:a.id,name:a.name,color:a.color});if(error)setSS('error',error.message);else setSS('ok','Guardado');}
async function sbDelArea(id){if(!SB)return;await SB.from('areas').delete().eq('id',id);setSS('ok','Listo');}
async function sbTree(t){if(!SB)return;setSS('saving','...');const{error}=await SB.from('trees').upsert({id:t.id,name:t.name,area_id:t.areaId||null,description:t.desc||null});if(error)setSS('error',error.message);else setSS('ok','Guardado');}
async function sbDelTree(id){if(!SB)return;await SB.from('trees').delete().eq('id',id);}
async function sbKpi(k,tid){if(!SB)return;setSS('saving','...');
  const{error}=await SB.from('kpis').upsert({id:k.id,tree_id:tid,name:k.name,parent_id:k.parent==='ROOT'?null:k.parent,unit:k.unit||null,kpi_type:k.type,yellow_zone:k.yellow||3,owner:k.owner||null});
  if(error)setSS('error',error.message);else setSS('ok','Guardado');}
async function sbDelKpi(id){if(!SB)return;await SB.from('kpis').delete().eq('id',id);}
async function sbData(tree,year){
  if(!SB)return;setSS('saving','Guardando...');
  const rows=(tree.data||[]).filter(d=>d.month.startsWith(year+'-')).map(d=>({
    kpi_id:d.kpiId,tree_id:tree.id,month:d.month,
    real:d.real,target:d.target,ytd_real:d.ytdReal,ytd_target:d.ytdTarget
  }));
  await SB.from('kpi_data').delete().eq('tree_id',tree.id).like('month',year+'-%');
  if(rows.length){const{error}=await SB.from('kpi_data').insert(rows);if(error){setSS('error',error.message);return;}}
  setSS('ok','Guardado');
}

// ─── UTILS ───────────────────────────────────────
function uid(){return(crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2,8));}
function fmt(v,u){if(v===null||v===undefined||v==='')return'-';const n=parseFloat(v);if(isNaN(n))return'-';return(Number.isInteger(n)?n.toString():n.toFixed(1))+(u?' '+u:'');}
function comp(r,t,tp){if(!t)return null;return tp==='lower_is_better'?(t/r)*100:(r/t)*100;}
function tl(r,t,tp,yp){const y=(yp||3)/100;const ratio=tp==='lower_is_better'?t/r:r/t;if(ratio>=1)return'gr';if(ratio>=1-y)return'yw';return'rd';}
function mkey(y,m){return y+'-'+String(m).padStart(2,'0');}
function mlbl(m){const[y,mo]=m.split('-');return MS[parseInt(mo,10)-1]+'-'+y.slice(2);}
function gTree(id){return DB.trees.find(t=>t.id===id);}
function gArea(id){return DB.areas.find(a=>a.id===id);}
function tYears(t){return[...new Set((t.data||[]).map(d=>d.month.slice(0,4)))].sort();}
function tMonths(t,y){
  // todos los meses que existen en la tabla para ese anio
  return[...new Set((t.data||[]).filter(d=>d.month.startsWith(y+'-')).map(d=>d.month))].sort();
}

// ─── YEAR/MONTH ───────────────────────────────────
function refreshYears(){
  const t=gTree(UI.tid);const sel=document.getElementById('ysel');
  if(!t){sel.innerHTML='<option>-</option>';UI.years=[];UI.year='';updateMons();return;}
  const yrs=tYears(t);UI.years=yrs;
  if(!yrs.includes(UI.year))UI.year=yrs[yrs.length-1]||'';
  sel.innerHTML=yrs.length?yrs.map(y=>'<option value="'+y+'"'+(y===UI.year?' selected':'')+'>'+y+'</option>').join(''):'<option>-</option>';
  updateMons();
}
function updateMons(){
  const t=gTree(UI.tid);const sel=document.getElementById('msel');
  if(!t||!UI.year){sel.innerHTML='<option>-</option>';return;}
  const mons=tMonths(t,UI.year);UI.months=mons;
  if(!mons.includes(UI.month))UI.month=mons[mons.length-1]||'';
  sel.innerHTML=mons.length?mons.map(m=>'<option value="'+m+'"'+(m===UI.month?' selected':'')+'>'+mlbl(m)+'</option>').join(''):'<option>-</option>';
}

// ─── SELECT TREE ──────────────────────────────────
function selectTree(id){
  UI.tid=id;
  UI.col=loadCol(id);
  UI.hl=null;
  UI.year='';UI.month='';
  document.getElementById('srch').value='';

  // posicionar en el ultimo mes con real cargado; si no hay, el ultimo con target; si no, el ultimo mes
  const tree=gTree(id);
  if(tree){
    const withReal=(tree.data||[]).filter(d=>d.real!==null).sort((a,b)=>b.month.localeCompare(a.month));
    const withAny=(tree.data||[]).filter(d=>d.real!==null||d.target!==null).sort((a,b)=>b.month.localeCompare(a.month));
    const anyMonth=(tree.data||[]).sort((a,b)=>b.month.localeCompare(a.month));
    const best=withReal[0]||withAny[0]||anyMonth[0];
    if(best){UI.year=best.month.slice(0,4);UI.month=best.month;}
  }

  refreshYears();
  renderSB();
  renderCanvas();
  document.getElementById('stree').textContent=tree?tree.name:'-';
  refreshDysel();
  if(UI.tab==='vd')renderData();
}

// ─── CANVAS ───────────────────────────────────────
function buildTree(tree,month){
  const dm={};(tree.data||[]).filter(d=>d.month===month).forEach(d=>{dm[d.kpiId]=d;});
  const km={};(tree.kpis||[]).forEach(k=>{km[k.id]={...k,children:[],data:dm[k.id]||null};});
  const roots=[];
  (tree.kpis||[]).forEach(k=>{
    if(k.parent==='ROOT'||!km[k.parent])roots.push(km[k.id]);
    else if(km[k.parent])km[k.parent].children.push(km[k.id]);
  });
  return roots;
}
function subW(node){
  if(UI.col.has(node.id)||!node.children.length)return CW;
  const cw=node.children.map(c=>subW(c));
  return Math.max(CW,cw.reduce((a,b)=>a+b,0)+HG*(node.children.length-1));
}
function placeNode(node,x,y,pos){
  pos[node.id]={x,y,node};
  if(UI.col.has(node.id)||!node.children.length)return;
  const cw=node.children.map(c=>subW(c));
  const tot=cw.reduce((a,b)=>a+b,0)+HG*(node.children.length-1);
  let cx=x+CW/2-tot/2;
  node.children.forEach((ch,i)=>{placeNode(ch,cx+(cw[i]-CW)/2,y+CH+VG,pos);cx+=cw[i]+HG;});
}
function renderCanvas(){
  const nEl=document.getElementById('cnodes');
  const svg=document.getElementById('csvg');
  const emp=document.getElementById('empty');
  nEl.innerHTML='';svg.innerHTML='';
  const tree=gTree(UI.tid);
  if(!tree){emp.style.display='flex';document.getElementById('emsg').textContent='Selecciona o crea un arbol';updateStat({});return;}
  const roots=buildTree(tree,UI.month);
  if(!roots.length){
    emp.style.display='flex';
    document.getElementById('emsg').textContent=!tree.kpis?.length?'Sin KPIs — agrega uno con el boton +':'Sin datos para este periodo';
    updateStat({});return;
  }
  emp.style.display='none';
  const pos={};
  const rw=roots.map(r=>subW(r));
  const totW=rw.reduce((a,b)=>a+b,0)+HG*(roots.length-1);
  let rx=0;roots.forEach((r,i)=>{placeNode(r,rx+(rw[i]-CW)/2,0,pos);rx+=rw[i]+HG;});
  const all=Object.values(pos);
  const maxY=Math.max(...all.map(p=>p.y))+CH+40;
  const OX=44,OY=32,cW=Math.max(totW+OX*2,600);
  svg.setAttribute('width',cW+OX*2);svg.setAttribute('height',maxY+OY+20);
  nEl.style.cssText='width:'+(cW+OX*2)+'px;height:'+(maxY+OY+20)+'px;position:relative';
  // connectors
  all.forEach(({x,y,node})=>{
    if(node.parent&&node.parent!=='ROOT'&&pos[node.parent]){
      const pp=pos[node.parent];
      const x1=OX+pp.x+CW/2,y1=OY+pp.y+CH,x2=OX+x+CW/2,y2=OY+y,my=(y1+y2)/2;
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d','M'+x1+','+y1+' C'+x1+','+my+' '+x2+','+my+' '+x2+','+y2);
      p.setAttribute('fill','none');p.setAttribute('stroke','var(--cn)');p.setAttribute('stroke-width','1.5');
      svg.appendChild(p);
    }
  });
  // cards
  let gr=0,rd=0,yw=0;
  all.forEach(({x,y,node})=>{
    const d=node.data;
    const r=d?(UI.ytd?d.ytdReal:d.real):null;
    const t=d?(UI.ytd?d.ytdTarget:d.target):null;
    const c=(r!==null&&t!==null)?comp(r,t,node.type):null;
    const color=(r!==null&&t!==null)?tl(r,t,node.type,node.yellow):'';
    if(color==='gr')gr++;else if(color==='rd')rd++;else if(color==='yw')yw++;
    const hasC=node.children.length>0;const isCol=UI.col.has(node.id);
    const card=document.createElement('div');
    card.className='card'+(color?' '+color:'')+(UI.hl===node.id?' hl':'');
    card.style.cssText='left:'+(OX+x)+'px;top:'+(OY+y)+'px';
    card.dataset.id=node.id;
    const nd=r===null||t===null;
    const off=!nd&&(color==='rd'||color==='yw');
    card.innerHTML=
      '<div class="ch">'
      +'<div class="cn">'+node.name+'</div>'
      +(hasC?'<div class="ctog" id="tog-'+node.id+'">'+(isCol?'+':'&minus;')+'</div>':'')
      +'</div>'
      +'<div class="cv">'
      +'<div class="vb"><div class="vl">'+(UI.ytd?'YTD Real':'Real')+'</div><div class="vn'+(off?' off':'')+'">'+(nd?'-':fmt(r,node.unit))+'</div></div>'
      +'<div class="vb"><div class="vl">'+(UI.ytd?'YTD Meta':'Meta')+'</div><div class="vn">'+(nd?'-':fmt(t,node.unit))+'</div></div>'
      +'</div>'
      +'<div class="cf">'
      +'<div><div class="cl">Cumpl.</div><div class="cc'+(color?' '+color:'')+'">'+(c!==null?c.toFixed(1)+'%':'-')+'</div></div>'
      +(nd?'<span style="font-size:9px;color:var(--tx3)">s/d</span>':'<div class="sem'+(color?' '+color:'')+'"></div>')
      +'</div>';
    // toggle collapse - use the toggle button directly
    const togEl=card.querySelector('.ctog');
    if(togEl){
      togEl.addEventListener('click',function(e){
        e.stopPropagation();
        e.preventDefault();
        if(UI.col.has(node.id))UI.col.delete(node.id);else UI.col.add(node.id);
        saveCol();
        renderCanvas();
      });
    }
    // card click = open chart (not on toggle)
    card.addEventListener('click',function(e){
      if(e.target.closest('.ctog'))return;
      openChart(node);
    });
    card.addEventListener('mouseenter',e=>showTT(e,node,r,t,c));
    card.addEventListener('mousemove',moveTT);
    card.addEventListener('mouseleave',hideTT);
    nEl.appendChild(card);
  });
  updateStat({gr,rd,yw,total:all.length});
}

function openChart(node){
  const tree=gTree(UI.tid);if(!tree)return;
  const kpi=tree.kpis.find(k=>k.id===node.id);if(!kpi)return;
  const data=(tree.data||[]).filter(d=>d.kpiId===kpi.id&&(d.real!==null||d.target!==null)).sort((a,b)=>a.month.localeCompare(b.month));
  if(!data.length){toast('Sin datos historicos para '+kpi.name);return;}
  const labels=data.map(d=>mlbl(d.month));
  const reals=data.map(d=>UI.ytd?d.ytdReal:d.real);
  const targets=data.map(d=>UI.ytd?d.ytdTarget:d.target);
  document.getElementById('chtit').textContent=kpi.name;
  document.getElementById('chsub').textContent=(kpi.owner?'Resp: '+kpi.owner+' | ':'')+'Unidad: '+(kpi.unit||'-');
  if(UI.chInst){UI.chInst.destroy();UI.chInst=null;}
  const ctx=document.getElementById('chcanv').getContext('2d');
  UI.chInst=new Chart(ctx,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Real',data:reals,backgroundColor:reals.map((r,i)=>{
        const t=targets[i];if(r===null||t===null)return'#cbd5e1';
        const ratio=kpi.type==='lower_is_better'?t/r:r/t;
        return ratio>=1?'rgba(47,158,68,.82)':ratio>=(1-(kpi.yellow||3)/100)?'rgba(230,119,0,.82)':'rgba(224,49,49,.82)';
      }),borderRadius:5,order:1},
      {label:'Meta',data:targets,type:'line',borderColor:'#64748b',borderWidth:2,borderDash:[5,4],pointBackgroundColor:'#64748b',pointRadius:3,fill:false,tension:0,order:0}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+(ctx.raw!==null?ctx.raw+(kpi.unit?' '+kpi.unit:''):'-')}}},
      scales:{x:{grid:{display:false},ticks:{font:{family:'Inter',size:10},color:'#8898b0'}},
        y:{grid:{color:'#e2e7f0'},ticks:{font:{family:'JetBrains Mono',size:10},color:'#8898b0'}}}}
  });
  openM('mch');
}

async function saveData(){
  const tree=gTree(UI.tid);if(!tree)return;
  const inputs=document.querySelectorAll('.ci');

  // Arrancar desde TODOS los datos existentes del anio (no solo los visibles)
  // para no borrar datos de otros responsables cuando hay filtro activo
  const existingYear=(tree.data||[]).filter(d=>d.month.startsWith(UI.dynYear+'-'));
  const map={};
  existingYear.forEach(d=>{
    const key=d.kpiId+'__'+d.month;
    map[key]={kpiId:d.kpiId,month:d.month,real:d.real,target:d.target,ytdReal:d.ytdReal,ytdTarget:d.ytdTarget};
  });

  // Superponer solo los inputs visibles en pantalla
  inputs.forEach(inp=>{
    const key=inp.dataset.kpi+'__'+inp.dataset.month;
    if(!map[key])map[key]={kpiId:inp.dataset.kpi,month:inp.dataset.month,real:null,target:null,ytdReal:null,ytdTarget:null};
    const v=inp.value.trim()===''?null:parseFloat(inp.value);
    map[key][inp.dataset.f]=isNaN(v)?null:v;
    inp.classList.remove('chg');
  });

  const other=(tree.data||[]).filter(d=>!d.month.startsWith(UI.dynYear+'-'));
  tree.data=[...other,...Object.values(map)];
  await sbData(tree,UI.dynYear);
  refreshYears();renderCanvas();toast('Datos guardados');
}
async function addYear(){
  const tree=gTree(UI.tid);if(!tree)return;
  const val=document.getElementById('nyi').value.trim();if(!val)return;
  const yr=parseInt(val).toString();
  if(tYears(tree).includes(yr)){toast('Ese ano ya existe');return;}
  if(!tree.data)tree.data=[];
  Array.from({length:12},(_,i)=>mkey(yr,i+1)).forEach(m=>{
    (tree.kpis||[]).forEach(k=>{
      if(!tree.data.find(d=>d.kpiId===k.id&&d.month===m))
        tree.data.push({kpiId:k.id,month:m,real:null,target:null,ytdReal:null,ytdTarget:null});
    });
  });
  await sbData(tree,yr);
  UI.dynYear=yr;refreshYears();refreshDysel();renderData();
  document.getElementById('nyi').value='';toast('Ano '+yr+' agregado');
}

async function delMonth(){
  const tree=gTree(UI.tid);if(!tree)return;
  const m=document.getElementById('mmasel').value;if(!m)return;
  const hasData=(tree.data||[]).some(d=>d.month===m&&(d.real!==null||d.target!==null));
  if(hasData){
    if(!confirm('El mes '+mlbl(m)+' tiene datos cargados. Seguro que lo queres eliminar?'))return;
  }
  tree.data=(tree.data||[]).filter(d=>d.month!==m);
  // delete from supabase
  if(SB){setSS('saving','...');await SB.from('kpi_data').delete().eq('tree_id',tree.id).eq('month',m);setSS('ok','Listo');}
  // if current month was deleted, move to previous
  if(UI.month===m){UI.month='';}
  refreshYears();refreshDysel();refreshMmasel();renderData();renderCanvas();
  toast('Mes '+mlbl(m)+' eliminado');
}

function exportXLS(){
  const tree=gTree(UI.tid);if(!tree){toast('Selecciona un arbol');return;}
  const year=UI.dynYear;if(!year){toast('Selecciona un ano');return;}
  const allM=Array.from({length:12},(_,i)=>mkey(year,i+1));
  const dm={};(tree.data||[]).forEach(d=>{dm[d.kpiId+'__'+d.month]=d;});
  const h1=['KPI','ID','Padre','Tipo','Unidad','Responsable'];
  allM.forEach(m=>{h1.push(ML[parseInt(m.split('-')[1],10)-1],'','','');});
  const h2=['','','','','',''];allM.forEach(()=>h2.push('Real','Meta','YTD Real','YTD Meta'));
  const rows=[h1,h2];
  tree.kpis.forEach(k=>{
    const pk=tree.kpis.find(x=>x.id===k.parent);
    const row=[k.name,k.id,k.parent==='ROOT'?'Raiz':(pk?pk.name:k.parent),k.type==='higher_is_better'?'Mayor=mejor':'Menor=mejor',k.unit||'',k.owner||''];
    allM.forEach(m=>{const d=dm[k.id+'__'+m]||{};row.push(d.real??'',d.target??'',d.ytdReal??'',d.ytdTarget??'');});
    rows.push(row);
  });
  const ws=XLSX.utils.aoa_to_sheet(rows);
  if(!ws['!merges'])ws['!merges']=[];
  allM.forEach((_,i)=>{const col=6+i*4;ws['!merges'].push({s:{r:0,c:col},e:{r:0,c:col+3}});});
  ws['!cols']=[{wch:22},{wch:20},{wch:18},{wch:14},{wch:8},{wch:16},...allM.flatMap(()=>[{wch:9},{wch:9},{wch:9},{wch:9}])];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Datos '+year);
  XLSX.writeFile(wb,'KPI_'+tree.name+'_'+year+'.xlsx');toast('Excel exportado');
}
async function importXLS(file){
  const tree=gTree(UI.tid);if(!tree){toast('Selecciona un arbol');return;}
  const year=UI.dynYear;if(!year){toast('Selecciona un ano');return;}
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array'});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
    if(rows.length<3){toast('Archivo sin datos');return;}
    const allM=Array.from({length:12},(_,i)=>mkey(year,i+1));
    const colM={};allM.forEach((m,i)=>{const b=6+i*4;colM[b]={month:m,f:'real'};colM[b+1]={month:m,f:'target'};colM[b+2]={month:m,f:'ytdReal'};colM[b+3]={month:m,f:'ytdTarget'};});
    const kbid={};tree.kpis.forEach(k=>{kbid[k.id]=k;});
    rows.slice(2).forEach(row=>{
      const kpi=kbid[row[1]]||(row[0]?tree.kpis.find(k=>k.name===row[0]):null);if(!kpi)return;
      Object.entries(colM).forEach(([col,{month,f}])=>{
        const v=row[parseInt(col)];const num=(v===''||v===null||v===undefined)?null:parseFloat(v);if(isNaN(num)&&num!==null)return;
        let e=tree.data.find(d=>d.kpiId===kpi.id&&d.month===month);
        if(!e){e={kpiId:kpi.id,month,real:null,target:null,ytdReal:null,ytdTarget:null};tree.data.push(e);}
        e[f]=num;
      });
    });
    await sbData(tree,year);refreshYears();renderData();renderCanvas();toast('Importado correctamente');
  }catch(e){console.error(e);toast('Error al leer el archivo');}
}

  document.getElementById('mktit').textContent=kpi?'Editar KPI':'Nuevo KPI';
  document.getElementById('kname').value=kpi?kpi.name:'';
  document.getElementById('kunit').value=kpi?(kpi.unit||''):'%';
  document.getElementById('ktype').value=kpi?kpi.type:'higher_is_better';
  document.getElementById('kyellow').value=kpi?(kpi.yellow??3):3;
  document.getElementById('kowner').value=kpi?(kpi.owner||''):'';
  const ps=document.getElementById('kparent');
  ps.innerHTML='<option value="ROOT">- Raiz</option>'+tree.kpis.filter(k=>k.id!==ekid).map(k=>'<option value="'+k.id+'"'+(kpi?.parent===k.id?' selected':'')+'>'+k.name+'</option>').join('');
  openM('mkpi');setTimeout(()=>document.getElementById('kname').focus(),80);
}
document.getElementById('bskpi').addEventListener('click',async()=>{
  const name=document.getElementById('kname').value.trim();if(!name)return;
  const tree=gTree(UI._kTid);if(!tree)return;
  const parent=document.getElementById('kparent').value;
  const unit=document.getElementById('kunit').value.trim();
  const type=document.getElementById('ktype').value;
  const yellow=parseFloat(document.getElementById('kyellow').value)||3;
  const owner=document.getElementById('kowner').value.trim();
  if(UI.eKpiId){
    const k=tree.kpis.find(k=>k.id===UI.eKpiId);
    Object.assign(k,{name,parent,unit,type,yellow,owner});
    await sbKpi(k,tree.id);
  }else{
    const id=uid();const kpi={id,name,parent,unit,type,yellow,owner};
    tree.kpis.push(kpi);
    tYears(tree).forEach(yr=>{Array.from({length:12},(_,i)=>mkey(yr,i+1)).forEach(m=>{tree.data.push({kpiId:id,month:m,real:null,target:null,ytdReal:null,ytdTarget:null});});});
    await sbKpi(kpi,tree.id);
  }
  renderSB();renderCanvas();if(UI.tab==='vd')renderData();closeM('mkpi');
});

function confirmDel(type,id){
  let msg='';
  if(type==='area'){const a=gArea(id);const c=DB.trees.filter(t=>t.areaId===id).length;msg='Eliminas el area <strong>'+a?.name+'</strong>? Los '+c+' arboles quedaran sin area.';}
  else if(type==='tree'){const t=gTree(id);msg='Eliminas el arbol <strong>'+t?.name+'</strong> y todos sus datos?';}
  else if(type==='kpi'){const tree=gTree(UI.tid);const kpi=tree?.kpis.find(k=>k.id===id);const cc=tree?.kpis.filter(k=>k.parent===id).length||0;msg='Eliminas el KPI <strong>'+kpi?.name+'</strong>?'+(cc?' Sus '+cc+' hijos quedaran en raiz.':'');}
  document.getElementById('cmsg').innerHTML=msg;UI.pending={type,id};openM('mconf');
}
document.getElementById('bcdel').addEventListener('click',async()=>{
  const{type,id}=UI.pending||{};
  if(type==='area'){DB.areas=DB.areas.filter(a=>a.id!==id);DB.trees.forEach(t=>{if(t.areaId===id)t.areaId='';});await sbDelArea(id);}
  else if(type==='tree'){DB.trees=DB.trees.filter(t=>t.id!==id);if(UI.tid===id){UI.tid=null;UI.month='';}await sbDelTree(id);}
  else if(type==='kpi'){const tree=gTree(UI.tid);if(tree){tree.kpis.forEach(k=>{if(k.parent===id)k.parent='ROOT';});tree.kpis=tree.kpis.filter(k=>k.id!==id);tree.data=(tree.data||[]).filter(d=>d.kpiId!==id);await sbDelKpi(id);}}
  renderSB();renderCanvas();if(UI.tab==='vd')renderData();refreshYears();refreshDysel();closeM('mconf');
});

// ─── TABS ─────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');
  UI.tab=t.dataset.tab;
  document.getElementById('vc').classList.toggle('on',UI.tab==='vc');
  document.getElementById('vd').classList.toggle('on',UI.tab==='vd');
  if(UI.tab==='vd'){refreshDysel();renderData();}
  if(UI.tab==='vc'){renderCanvas();}
}));

// ─── TOOLBAR ──────────────────────────────────────
document.getElementById('bnt').addEventListener('click',()=>{if(!DB.areas.length){openArea();toast('Primero crea un area');return;}openTreeM();});
document.getElementById('ysel').addEventListener('change',function(){UI.year=this.value;updateMons();renderCanvas();});
document.getElementById('msel').addEventListener('change',function(){UI.month=this.value;renderCanvas();});
document.getElementById('bprev').addEventListener('click',()=>{
  const i=UI.months.indexOf(UI.month);
  if(i>0){UI.month=UI.months[i-1];document.getElementById('msel').value=UI.month;renderCanvas();}
  else{const yi=UI.years.indexOf(UI.year);if(yi>0){UI.year=UI.years[yi-1];document.getElementById('ysel').value=UI.year;updateMons();UI.month=UI.months[UI.months.length-1]||'';document.getElementById('msel').value=UI.month;renderCanvas();}}
});
document.getElementById('bnext').addEventListener('click',()=>{
  const i=UI.months.indexOf(UI.month);
  if(i<UI.months.length-1){UI.month=UI.months[i+1];document.getElementById('msel').value=UI.month;renderCanvas();}
  else{const yi=UI.years.indexOf(UI.year);if(yi<UI.years.length-1){UI.year=UI.years[yi+1];document.getElementById('ysel').value=UI.year;updateMons();UI.month=UI.months[0]||'';document.getElementById('msel').value=UI.month;renderCanvas();}}
});
document.getElementById('ytd').addEventListener('change',function(){UI.ytd=this.checked;renderCanvas();});
document.getElementById('bexp').addEventListener('click',()=>{UI.col.clear();saveCol();renderCanvas();});
document.getElementById('bcol').addEventListener('click',()=>{
  const tree=gTree(UI.tid);if(!tree)return;
  tree.kpis.forEach(k=>{if(tree.kpis.some(x=>x.parent===k.id))UI.col.add(k.id);});
  saveCol();renderCanvas();
});
document.getElementById('bzi').addEventListener('click',()=>setZ(UI.zoom*1.15));
document.getElementById('bzo').addEventListener('click',()=>setZ(UI.zoom/1.15));
document.getElementById('bzr').addEventListener('click',()=>{UI.zoom=1;UI.px=60;UI.py=30;applyT();});
document.getElementById('bsave').addEventListener('click',saveData);
document.getElementById('bayr').addEventListener('click',addYear);
document.getElementById('bdly').addEventListener('click',()=>{UI.dynYear=document.getElementById('dysel').value;renderData();refreshMmasel();});
document.getElementById('dysel').addEventListener('change',function(){UI.dynYear=this.value;renderData();refreshMmasel();});
document.getElementById('ofilter').addEventListener('change',()=>renderData());
document.getElementById('bclrf').addEventListener('click',()=>{document.getElementById('ofilter').value='';renderData();});
document.getElementById('bxls').addEventListener('click',exportXLS);
document.getElementById('baddm').addEventListener('click',addMonth);
document.getElementById('bdelm').addEventListener('click',delMonth);
document.getElementById('bixls').addEventListener('click',()=>document.getElementById('xfile').click());
document.getElementById('xfile').addEventListener('change',function(){if(this.files[0])importXLS(this.files[0]);this.value='';});
document.getElementById('bcfg').addEventListener('click',()=>{
  const cfg=getCfg();document.getElementById('cfgu').value=cfg.url||'';document.getElementById('cfgk').value=cfg.key||'';openM('mcfg');
});
document.getElementById('bscfg').addEventListener('click',async()=>{
  const url=document.getElementById('cfgu').value.trim();const key=document.getElementById('cfgk').value.trim();
  if(!url||!key){toast('Completa los dos campos');return;}
  saveCfg(url,key);closeM('mcfg');
  SB=null;if(initSB()){setSS('saving','Cargando...');await sbLoad();renderSB();if(UI.tid)renderCanvas();}
});
document.getElementById('srch').addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();const tree=gTree(UI.tid);if(!tree)return;
  if(!q){UI.hl=null;renderCanvas();return;}
  const match=tree.kpis.find(k=>k.name.toLowerCase().includes(q));if(!match)return;
  const km={};tree.kpis.forEach(k=>km[k.id]=k);let cur=km[match.parent];while(cur){UI.col.delete(cur.id);cur=km[cur.parent];}
  UI.hl=match.id;renderCanvas();
  setTimeout(()=>{const card=document.querySelector('.card[data-id="'+match.id+'"]');if(card){const wr=document.getElementById('vc').getBoundingClientRect();const cr=card.getBoundingClientRect();UI.px+=wr.width/2-(cr.left-wr.left+cr.width/2);UI.py+=wr.height/2-(cr.top-wr.top+cr.height/2);applyT();}},60);
});
document.getElementById('bpng').addEventListener('click',async()=>{
  const ov=document.getElementById('exp');ov.classList.add('on');
  try{const ci=document.getElementById('ci');const sv=ci.style.transform;ci.style.transform='translate(0,0) scale(1)';await new Promise(r=>setTimeout(r,100));const c=await html2canvas(ci,{backgroundColor:'#f0f3fb',scale:2});ci.style.transform=sv;const a=document.createElement('a');a.download='KPI_'+UI.month+'.png';a.href=c.toDataURL('image/png');a.click();}catch(e){console.error(e)}
  ov.classList.remove('on');
});
document.getElementById('bpdf').addEventListener('click',async()=>{
  const ov=document.getElementById('exp');ov.classList.add('on');
  try{const ci=document.getElementById('ci');const sv=ci.style.transform;ci.style.transform='translate(0,0) scale(1)';await new Promise(r=>setTimeout(r,100));const c=await html2canvas(ci,{backgroundColor:'#f0f3fb',scale:2});ci.style.transform=sv;const{jsPDF}=window.jspdf;const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a3'});const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();const ratio=Math.min(pw/(c.width/2),ph/(c.height/2));const w=(c.width/2)*ratio,h=(c.height/2)*ratio;pdf.addImage(c.toDataURL('image/png'),'PNG',(pw-w)/2,(ph-h)/2,w,h);pdf.save('KPI_'+UI.month+'.pdf');}catch(e){console.error(e)}
  ov.classList.remove('on');
});

// ─── ZOOM & PAN ───────────────────────────────────
function applyT(){document.getElementById('ci').style.transform='translate('+UI.px+'px,'+UI.py+'px) scale('+UI.zoom+')';document.getElementById('zlv').textContent=Math.round(UI.zoom*100)+'%';}
function setZ(z){UI.zoom=Math.min(2.5,Math.max(0.1,z));applyT();}
const vc=document.getElementById('vc');
vc.addEventListener('wheel',e=>{e.preventDefault();const nz=Math.min(2.5,Math.max(0.1,UI.zoom+(-e.deltaY*.001)*UI.zoom));const wr=vc.getBoundingClientRect();const mx=e.clientX-wr.left,my=e.clientY-wr.top;const sc=nz/UI.zoom;UI.px=mx-sc*(mx-UI.px);UI.py=my-sc*(my-UI.py);UI.zoom=nz;applyT();},{passive:false});
let drag={on:false};
vc.addEventListener('mousedown',e=>{if(e.target.closest('.card'))return;drag={on:true,sx:e.clientX,sy:e.clientY,ox:UI.px,oy:UI.py};vc.classList.add('drag');});
window.addEventListener('mousemove',e=>{if(!drag.on)return;UI.px=drag.ox+(e.clientX-drag.sx);UI.py=drag.oy+(e.clientY-drag.sy);applyT();});
window.addEventListener('mouseup',()=>{drag.on=false;vc.classList.remove('drag');});

// ─── TOOLTIP ─────────────────────────────────────
function showTT(e,node,r,t,c){
  const tt=document.getElementById('tt');
  tt.innerHTML='<strong>'+node.name+'</strong>'
    +'<div class="tr"><span class="tk">Real</span><span class="tv">'+fmt(r,node.unit)+'</span></div>'
    +'<div class="tr"><span class="tk">Meta</span><span class="tv">'+fmt(t,node.unit)+'</span></div>'
    +'<div class="tr"><span class="tk">Cumpl.</span><span class="tv">'+(c!==null?c.toFixed(1)+'%':'-')+'</span></div>'
    +(node.owner?'<div class="tr"><span class="tk">Resp.</span><span class="tv">'+node.owner+'</span></div>':'');
  tt.classList.add('on');moveTT(e);
}
function moveTT(e){const tt=document.getElementById('tt');const x=e.clientX+14,y=e.clientY-10;tt.style.left=(x+tt.offsetWidth>window.innerWidth?e.clientX-tt.offsetWidth-14:x)+'px';tt.style.top=(y+tt.offsetHeight>window.innerHeight?e.clientY-tt.offsetHeight-10:y)+'px';}
function hideTT(){document.getElementById('tt').classList.remove('on');}
function updateStat({gr=0,rd=0,yw=0,total=0}){document.getElementById('sgr').textContent=gr;document.getElementById('srd').textContent=rd;document.getElementById('syw').textContent=yw;document.getElementById('stot').textContent=total;}

// ─── TOAST ────────────────────────────────────────
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2500);}

// ─── INIT ─────────────────────────────────────────
async function init(){
  // auto-save hardcoded credentials if not already saved
  const cfg=getCfg();
  if(!cfg.url&&!SB_URL.includes('TU_PROJECT')){saveCfg(SB_URL,SB_KEY);}

  const ok=initSB();
  renderSB();
  applyT();
  if(!ok){setSS('error','Configura Supabase con el boton config');return;}

  try{
    await sbLoad();
    renderSB();
    if(DB.trees.length){
      const t=DB.trees[0];
      selectTree(t.id);
    }
    applyT();
  }catch(e){
    setSS('error','Error: '+e.message);
    console.error(e);
  }
}
init();
</script>
